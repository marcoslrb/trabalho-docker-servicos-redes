services:
  # ============================================
  # Banco de Dados PostgreSQL
  # ============================================
  postgres:
    image: postgres:17
    container_name: database
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - netatividade01
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ============================================
  # Backend FastAPI
  # ============================================
  fastapi:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fastapi
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - netatividade01

  # ============================================
  # Servidor NGINX (Proxy Reverso + Frontend)
  # ============================================
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: nginx
    restart: unless-stopped
    ports:
      - "80:8080"
      - "443:8443"
      # O NGINX expõe as portas 80 e 443 para a rede externa, mapeando-as para as portas internas 8080 e 8443, respectivamente.
    depends_on:
      - fastapi
    networks:
      - netatividade01

# ============================================
# Rede customizada da aplicação
# ============================================
networks:
  netatividade01:
    driver: bridge
    # Modo bridge significa que os containers se comunicam entre si usando o nome do serviço como hostname 
    # e o Docker gerencia o roteamento interno. Isso é ideal para a maioria dos casos de uso, onde os containers
    # precisam se comunicar entre si, mas não precisam ser expostos diretamente à rede externa.

# ============================================
# Volumes para persistência dos dados do PostgreSQL (o banco)
# ============================================
volumes:
  pgdata:
    driver: local
