# Definição de âncora para evitar repetição das variáveis de ambiente do PostgreSQL
x-postgres-common: &postgres-common
  POSTGRES_USER: ${POSTGRES_USER}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
  POSTGRES_DB: ${POSTGRES_DB}

services:
  # ============================================
  # Banco de Dados PostgreSQL
  # ============================================
  postgres:
    image: postgres:17
    container_name: database
    restart: unless-stopped
    environment:
      <<: *postgres-common # Usando a âncora definida acima
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - netatividade01
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ============================================
  # Backend FastAPI
  # ============================================
  fastapi:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fastapi
    restart: unless-stopped
    environment:
      <<: *postgres-common # Usando a âncora para os dados de autenticação
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - netatividade01

  # ============================================
  # Servidor NGINX (Proxy Reverso + Frontend)
  # ============================================
  nginx:
    # Mudança: Usando imagem direta em vez de Dockerfile customizado
    image: nginx:alpine
    container_name: nginx
    restart: unless-stopped
    ports:
      - "80:8080"
      - "443:8443"
    # Mudança: Montando volumes para configuração e arquivos estáticos
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/html:/usr/share/nginx/html:ro
    # Mudança: Gerando certificado SSL autoassinado inline via comando de inicialização
    # 1. Instala openssl via apk
    # 2. Cria o diretório para os certificados
    # 3. Gera o par de chaves/certificado
    # 4. Inicia o nginx em primeiro plano
    command: >
      sh -c "apk add --no-cache openssl &&
             mkdir -p /etc/nginx/ssl &&
             openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
               -keyout /etc/nginx/ssl/nginx.key \
               -out /etc/nginx/ssl/nginx.crt \
               -subj '/C=BR/ST=Estado/L=Cidade/O=Grupo2/CN=localhost' &&
             nginx -g 'daemon off;'"
    depends_on:
      - fastapi
    networks:
      - netatividade01

# ============================================
# Rede customizada da aplicação
# ============================================
networks:
  netatividade01:
    driver: bridge

# ============================================
# Volumes para persistência dos dados do PostgreSQL
# ============================================
volumes:
  pgdata:
    driver: local
