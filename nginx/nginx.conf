
# Define um "apelido" para o backend FastAPI.
# Em vez de repetir "fastapi:8080" em vários lugares,
# o NGINX passa a usar o nome lógico "fastapi_backend".
#
# Se no futuro o backend mudar de nome, porta ou tiver mais de uma instância,
# fica mais fácil ajustar aqui.
#
# Neste caso, "fastapi" é o nome do serviço no Docker Compose
# e "8080" é a porta interna em que a API escuta.
upstream fastapi_backend {
    server fastapi:8080;
}


server {
    # Porta HTTP interna do container NGINX.
    # No docker-compose, ela está mapeada para a porta 80 do host.
    #
    # Exemplo:
    # host 80  -> container 8080
    #
    # Se mudasse aqui para "listen 80",
    # também precisaria ajustar o mapeamento de portas no compose.
    listen 8080;

    # Nome do servidor.
    # Como o projeto roda localmente, "localhost" faz sentido.
    # Em ambiente real, isso poderia ser um domínio.
    server_name localhost;


    # --------------------------------------------
    # Frontend estático na raiz
    # --------------------------------------------
    location / {
        # Pasta onde o NGINX procura os arquivos do frontend.
        # Essa pasta recebe os arquivos montados pelo Docker volume.
        root /usr/share/nginx/html;

        # Arquivo padrão quando alguém acessa a raiz "/".
        index index.html;

        # Tenta servir:
        # 1. o arquivo exato pedido
        # 2. a pasta pedida
        # 3. se nada existir, retorna /index.html
        #
        # Isso é muito útil para frontend SPA ou navegação cliente,
        # porque evita erro 404 ao atualizar uma rota.
        #
        # Se remover essa linha e acessar uma rota que não exista fisicamente,
        # o navegador pode receber 404.
        try_files $uri $uri/ /index.html;
    }


    # --------------------------------------------
    # Proxy reverso para a API FastAPI
    # --------------------------------------------
    location /api/ {
        # Encaminha tudo que chegar em /api/ para o backend definido no upstream.
        #
        # Como há barra no final, o NGINX reescreve o caminho de forma compatível
        # com a estrutura esperada pela aplicação quando ela já está preparada
        # para responder em /api via root_path.
        proxy_pass http://fastapi_backend/;

        # Repassa o host original da requisição.
        # Isso ajuda a aplicação backend a saber como o cliente chegou.
        proxy_set_header Host $host;

        # Envia o IP real do cliente.
        # Útil para logs, auditoria e depuração.
        proxy_set_header X-Real-IP $remote_addr;

        # Envia a cadeia de proxies pela qual a requisição passou.
        # Útil em cenários com mais de um proxy.
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # Informa se a requisição original veio por HTTP ou HTTPS.
        # Importante para apps que precisam saber o esquema real.
        proxy_set_header X-Forwarded-Proto $scheme;

        # Tempo máximo para ler resposta do backend.
        # Se diminuir demais, requisições demoradas podem falhar.
        proxy_read_timeout 300;

        # Tempo máximo para estabelecer conexão com o backend.
        proxy_connect_timeout 300;

        # Tempo máximo para enviar dados ao backend.
        proxy_send_timeout 300;
    }
}


server {
    # Porta HTTPS interna do container NGINX.
    # No docker-compose, ela está mapeada para a porta 443 do host.
    #
    # Exemplo:
    # host 443 -> container 8443
    #
    # Se mudar isso, precisa alinhar com o compose.
    listen 8443 ssl;

    # Nome do servidor HTTPS.
    server_name localhost;


    # Caminho do certificado SSL autoassinado.
    # O NGINX usa esse arquivo para servir HTTPS.
    #
    # Se o arquivo não existir, o NGINX não sobe corretamente em HTTPS.
    ssl_certificate /etc/nginx/ssl/nginx.crt;

    # Chave privada do certificado SSL.
    # Também precisa existir e combinar com o certificado acima.
    ssl_certificate_key /etc/nginx/ssl/nginx.key;


    # --------------------------------------------
    # Frontend estático na raiz
    # --------------------------------------------
    location / {
        # Mesmo comportamento do bloco HTTP:
        # serve arquivos estáticos do frontend.
        root /usr/share/nginx/html;

        # Arquivo padrão da aplicação.
        index index.html;

        # Mantém suporte a rotas do frontend sem 404.
        try_files $uri $uri/ /index.html;
    }


    # --------------------------------------------
    # Proxy reverso para a API FastAPI
    # --------------------------------------------
    location /api/ {
        # Encaminha chamadas da API para o backend FastAPI.
        proxy_pass http://fastapi_backend/;

        # Repassa headers úteis para a aplicação backend.
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts de comunicação com o backend.
        proxy_read_timeout 300;
        proxy_connect_timeout 300;
        proxy_send_timeout 300;
    }
}
```

## O que aconteceria se mudasse (para estudar para a entrevista):

# Se você mudar `server fastapi:8080;` para outro nome, o NGINX só vai conseguir falar com o backend se esse nome existir como serviço ou hostname na rede Docker. Se colocar `localhost:8080`, por exemplo, o NGINX tentará acessar ele mesmo, não o container do FastAPI.

# Se trocar `try_files $uri $uri/ /index.html;`, o comportamento da navegação muda. Em frontend com rotas do lado do cliente, remover isso costuma gerar 404 ao atualizar páginas internas, porque o NGINX passa a procurar um arquivo físico que não existe. 

# Se mudar `proxy_pass http://fastapi_backend/;`, precisa tomar cuidado com a barra final. Em NGINX, pequenas mudanças nesse trecho alteram como o caminho é repassado ao backend, então pode quebrar `/api/...` dependendo da forma como sua FastAPI está configurada com `root_path="/api"`. 